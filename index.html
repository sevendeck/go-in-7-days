<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go in 7 Days</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --panel: #111620;
    --border: #1e2a3a;
    --accent: #00d4ff;
    --accent2: #7af3d0;
    --go: #00ADD8;
    --text: #c9d4e0;
    --muted: #4a5a6e;
    --done: #1a3a2a;
    --done-border: #2aaa6a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1.5rem;
    background: linear-gradient(135deg, #0a0e14 0%, #0d1520 100%);
  }
  .go-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--go);
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--go), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header h1 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  header p { color: var(--muted); font-size: 0.85rem; }
  .progress-bar {
    margin-left: auto;
    text-align: right;
  }
  .progress-bar span { font-size: 0.75rem; color: var(--muted); }
  .bar-outer { width: 160px; height: 6px; background: var(--border); border-radius: 3px; margin-top: 4px; }
  .bar-inner { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--go), var(--accent2)); transition: width 0.4s ease; }

  .layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 90px); }

  .sidebar {
    width: 220px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 1rem 0;
    background: var(--panel);
    flex-shrink: 0;
  }
  .day-btn {
    width: 100%;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    text-align: left;
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .day-btn:hover { color: var(--text); background: rgba(0,212,255,0.05); }
  .day-btn.active { color: var(--accent); background: rgba(0,212,255,0.08); border-right: 2px solid var(--accent); }
  .day-btn.completed { color: var(--done-border); }
  .day-btn .check { font-size: 0.7rem; }

  .content { flex: 1; overflow-y: auto; padding: 2rem 2.5rem; }

  .day-header { margin-bottom: 2rem; }
  .day-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--go);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .day-header h2 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem; }
  .day-header p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; max-width: 600px; }

  .topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
  .topic-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem 1.4rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .topic-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--go), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .topic-card:hover { border-color: rgba(0,212,255,0.3); transform: translateY(-1px); }
  .topic-card:hover::before { opacity: 1; }
  .topic-card.done { background: var(--done); border-color: var(--done-border); }
  .topic-card.done::before { opacity: 1; background: linear-gradient(90deg, var(--done-border), var(--accent2)); }
  .topic-card.expanded { border-color: rgba(0,212,255,0.5); }
  .topic-card.expanded::before { opacity: 1; }

  .topic-title {
    font-size: 0.95rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topic-title .arrow { color: var(--muted); transition: transform 0.2s; font-size: 0.8rem; }
  .topic-card.expanded .topic-title .arrow { transform: rotate(90deg); color: var(--accent); }
  .topic-subtitle { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; font-family: 'JetBrains Mono', monospace; }

  .topic-body { display: none; margin-top: 1rem; }
  .topic-card.expanded .topic-body { display: block; }

  .explanation {
    font-size: 0.85rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 0.8rem;
  }

  .code-block {
    background: #060a10;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.7;
    overflow-x: auto;
    white-space: pre;
    color: #a8c7fa;
    margin-bottom: 0.8rem;
  }
  .code-block .kw { color: #ff79c6; }
  .code-block .fn { color: #8be9fd; }
  .code-block .str { color: #f1fa8c; }
  .code-block .cm { color: #4a5a6e; }
  .code-block .num { color: #bd93f9; }
  .code-block .tp { color: #50fa7b; }

  .key-points { margin-top: 0.8rem; }
  .key-points h4 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 0.5rem; }
  .kp { font-size: 0.82rem; color: var(--text); padding: 0.3rem 0; border-bottom: 1px solid var(--border); display: flex; gap: 0.5rem; }
  .kp:last-child { border-bottom: none; }
  .kp::before { content: '→'; color: var(--accent2); flex-shrink: 0; }

  .mark-done-btn {
    margin-top: 1rem;
    width: 100%;
    padding: 0.5rem;
    border: 1px solid var(--done-border);
    background: rgba(42,170,106,0.1);
    color: var(--done-border);
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .mark-done-btn:hover { background: rgba(42,170,106,0.2); }
  .topic-card.done .mark-done-btn { opacity: 0.5; cursor: default; }

  .day-complete-banner {
    background: linear-gradient(135deg, #0d2a1a, #0a1e28);
    border: 1px solid var(--done-border);
    border-radius: 10px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.9rem;
  }
  .day-complete-banner .emoji { font-size: 1.5rem; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="go-logo">Go</div>
  <div>
    <h1>Go in 7 Days</h1>
    <p>Zero to proficient — one day at a time</p>
  </div>
  <div class="progress-bar">
    <span id="prog-text">0 / 35 topics done</span>
    <div class="bar-outer"><div class="bar-inner" id="prog-bar" style="width:0%"></div></div>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content" id="content"></main>
</div>

<script>
const curriculum = [
  {
    day: 1,
    title: "Hello, Go",
    subtitle: "Setup, syntax basics, variables",
    desc: "Install Go, write your first program, understand the file structure and basic data types.",
    topics: [
      {
        title: "Setup & First Program",
        sub: "go install · go run · main package",
        explain: "Go programs start with a package declaration. The main package is the entry point. Every Go file belongs to a package.",
        code: `<span class="kw">package</span> main

<span class="kw">import</span> <span class="str">"fmt"</span>

<span class="kw">func</span> <span class="fn">main</span>() {
    fmt.<span class="fn">Println</span>(<span class="str">"Hello, Go!"</span>)
}`,
        points: ["Run with: go run main.go", "Build binary: go build main.go", "fmt.Println adds newline automatically", "Go files end in .go"]
      },
      {
        title: "Variables & Types",
        sub: "var · := · string · int · float64 · bool",
        explain: "Go is statically typed. You can declare variables with var or use := for short declaration inside functions.",
        code: `<span class="kw">var</span> name <span class="tp">string</span> = <span class="str">"Gopher"</span>
<span class="kw">var</span> age <span class="tp">int</span> = <span class="num">25</span>

<span class="cm">// Short declaration (inside functions only)</span>
city := <span class="str">"Jakarta"</span>
score := <span class="num">98.5</span>  <span class="cm">// float64</span>
active := <span class="kw">true</span>

fmt.<span class="fn">Println</span>(name, age, city, score, active)`,
        points: [":= infers the type automatically", "var is used at package level", "Go has no implicit type conversion", "Zero values: 0, \"\", false, nil"]
      },
      {
        title: "Constants & iota",
        sub: "const · iota · typed constants",
        explain: "Constants are values that cannot change. iota is a special counter used inside const blocks.",
        code: `<span class="kw">const</span> Pi = <span class="num">3.14159</span>
<span class="kw">const</span> AppName = <span class="str">"MyApp"</span>

<span class="kw">const</span> (
    Mon = <span class="kw">iota</span> + <span class="num">1</span>  <span class="cm">// 1</span>
    Tue              <span class="cm">// 2</span>
    Wed              <span class="cm">// 3</span>
)
fmt.<span class="fn">Println</span>(Mon, Tue, Wed) <span class="cm">// 1 2 3</span>`,
        points: ["iota resets to 0 in each const block", "Constants can be typed or untyped", "Use ALL_CAPS or CamelCase for constants", "iota auto-increments by 1"]
      },
      {
        title: "fmt Package",
        sub: "Println · Printf · Sprintf · Scan",
        explain: "The fmt package handles formatted I/O. Printf uses format verbs like %s, %d, %v.",
        code: `name := <span class="str">"Go"</span>
version := <span class="num">1</span>

fmt.<span class="fn">Printf</span>(<span class="str">"Language: %s v%d\\n"</span>, name, version)
fmt.<span class="fn">Printf</span>(<span class="str">"Value: %v, Type: %T\\n"</span>, <span class="num">42</span>, <span class="num">42</span>)

<span class="cm">// Sprintf returns a string</span>
msg := fmt.<span class="fn">Sprintf</span>(<span class="str">"Hello %s!"</span>, name)

<span class="cm">// Read user input</span>
<span class="kw">var</span> input <span class="tp">string</span>
fmt.<span class="fn">Scan</span>(&amp;input)`,
        points: ["%v = default format, %T = type name", "%s = string, %d = int, %f = float", "%q = quoted string, %b = binary", "\\n = newline in Printf"]
      },
      {
        title: "Strings & Runes",
        sub: "string · rune · len · strings package",
        explain: "Strings in Go are byte slices. For Unicode characters (runes), use rune type or range loops.",
        code: `<span class="kw">import</span> <span class="str">"strings"</span>

s := <span class="str">"Hello, 世界"</span>
fmt.<span class="fn">Println</span>(<span class="fn">len</span>(s))        <span class="cm">// bytes, not chars!</span>

<span class="cm">// Range iterates over runes</span>
<span class="kw">for</span> i, r := <span class="kw">range</span> s {
    fmt.<span class="fn">Printf</span>(<span class="str">"%d: %c\\n"</span>, i, r)
}

fmt.<span class="fn">Println</span>(strings.<span class="fn">ToUpper</span>(s))
fmt.<span class="fn">Println</span>(strings.<span class="fn">Contains</span>(s, <span class="str">"Hello"</span>))`,
        points: ["len() returns byte count, not character count", "Use range to iterate characters safely", "strings package: Split, Join, Replace, Trim", "Concatenate with + or strings.Builder"]
      }
    ]
  },
  {
    day: 2,
    title: "Control Flow",
    subtitle: "if · for · switch · defer",
    desc: "Master Go's control structures. Go only has one loop keyword (for) and uses it for everything.",
    topics: [
      {
        title: "if / else",
        sub: "if · else if · init statement",
        explain: "Go's if supports an initialization statement before the condition. No parentheses needed around conditions.",
        code: `x := <span class="num">10</span>

<span class="kw">if</span> x &gt; <span class="num">5</span> {
    fmt.<span class="fn">Println</span>(<span class="str">"big"</span>)
} <span class="kw">else if</span> x == <span class="num">5</span> {
    fmt.<span class="fn">Println</span>(<span class="str">"equal"</span>)
} <span class="kw">else</span> {
    fmt.<span class="fn">Println</span>(<span class="str">"small"</span>)
}

<span class="cm">// Init statement — val scoped to if block</span>
<span class="kw">if</span> val := <span class="fn">compute</span>(); val &gt; <span class="num">0</span> {
    fmt.<span class="fn">Println</span>(val)
}`,
        points: ["No parentheses around condition", "Braces {} are always required", "Init statement variable is block-scoped", "No ternary operator in Go"]
      },
      {
        title: "for Loops",
        sub: "classic · while-style · range · infinite",
        explain: "Go has only one loop keyword: for. It covers all looping patterns.",
        code: `<span class="cm">// Classic C-style</span>
<span class="kw">for</span> i := <span class="num">0</span>; i &lt; <span class="num">5</span>; i++ {
    fmt.<span class="fn">Println</span>(i)
}

<span class="cm">// While-style</span>
n := <span class="num">1</span>
<span class="kw">for</span> n &lt; <span class="num">100</span> { n *= <span class="num">2</span> }

<span class="cm">// Range over slice</span>
nums := []<span class="tp">int</span>{<span class="num">10</span>, <span class="num">20</span>, <span class="num">30</span>}
<span class="kw">for</span> i, v := <span class="kw">range</span> nums {
    fmt.<span class="fn">Println</span>(i, v)
}

<span class="cm">// Infinite loop</span>
<span class="kw">for</span> { <span class="kw">break</span> }`,
        points: ["No while/do-while — use for instead", "Use _ to discard index: for _, v := range s", "break exits, continue skips to next iteration", "range works on strings, slices, maps, channels"]
      },
      {
        title: "switch",
        sub: "switch · case · fallthrough · type switch",
        explain: "Go's switch is cleaner than C — no break needed, cases don't fall through by default.",
        code: `day := <span class="str">"Mon"</span>

<span class="kw">switch</span> day {
<span class="kw">case</span> <span class="str">"Mon"</span>, <span class="str">"Tue"</span>:
    fmt.<span class="fn">Println</span>(<span class="str">"Weekday"</span>)
<span class="kw">case</span> <span class="str">"Sat"</span>, <span class="str">"Sun"</span>:
    fmt.<span class="fn">Println</span>(<span class="str">"Weekend"</span>)
<span class="kw">default</span>:
    fmt.<span class="fn">Println</span>(<span class="str">"Other"</span>)
}

<span class="cm">// No condition = if-else chain</span>
x := <span class="num">42</span>
<span class="kw">switch</span> {
<span class="kw">case</span> x &lt; <span class="num">10</span>: fmt.<span class="fn">Println</span>(<span class="str">"small"</span>)
<span class="kw">case</span> x &lt; <span class="num">100</span>: fmt.<span class="fn">Println</span>(<span class="str">"medium"</span>)
}`,
        points: ["No break needed — cases don't fall through", "Use fallthrough keyword to force fall-through", "Multiple values per case: case 1, 2, 3:", "switch without expression = flexible if/else"]
      },
      {
        title: "defer",
        sub: "defer · LIFO order · cleanup",
        explain: "defer schedules a function call to run when the surrounding function returns. Great for cleanup.",
        code: `<span class="kw">func</span> <span class="fn">readFile</span>() {
    f, _ := os.<span class="fn">Open</span>(<span class="str">"file.txt"</span>)
    <span class="kw">defer</span> f.<span class="fn">Close</span>()  <span class="cm">// runs when readFile exits</span>
    
    <span class="cm">// do work with f...</span>
}

<span class="cm">// Multiple defers run LIFO (last in, first out)</span>
<span class="kw">func</span> <span class="fn">main</span>() {
    <span class="kw">defer</span> fmt.<span class="fn">Println</span>(<span class="str">"third"</span>)
    <span class="kw">defer</span> fmt.<span class="fn">Println</span>(<span class="str">"second"</span>)
    <span class="kw">defer</span> fmt.<span class="fn">Println</span>(<span class="str">"first"</span>)
    <span class="cm">// prints: first, second, third</span>
}`,
        points: ["defer runs AFTER function returns", "Multiple defers: last-in, first-out order", "Arguments evaluated immediately, not at defer time", "Use for: Close(), Unlock(), cleanup tasks"]
      },
      {
        title: "goto & labels",
        sub: "labels · break label · continue label",
        explain: "Go supports labels for breaking out of nested loops. goto is rarely used but exists.",
        code: `<span class="cm">// Break out of nested loop using label</span>
outer:
<span class="kw">for</span> i := <span class="num">0</span>; i &lt; <span class="num">3</span>; i++ {
    <span class="kw">for</span> j := <span class="num">0</span>; j &lt; <span class="num">3</span>; j++ {
        <span class="kw">if</span> i == <span class="num">1</span> &amp;&amp; j == <span class="num">1</span> {
            <span class="kw">break</span> outer  <span class="cm">// exits BOTH loops</span>
        }
        fmt.<span class="fn">Println</span>(i, j)
    }
}`,
        points: ["Labels must be followed by a for, switch, or select", "break label exits labeled statement", "continue label continues labeled loop", "goto jumps to label — avoid in most code"]
      }
    ]
  },
  {
    day: 3,
    title: "Functions",
    subtitle: "functions · variadic · closures · recursion",
    desc: "Functions are first-class in Go. Learn multiple return values, closures, and how Go handles errors through returns.",
    topics: [
      {
        title: "Function Basics",
        sub: "func · parameters · multiple returns",
        explain: "Go functions can return multiple values — the idiomatic way to return both a result and an error.",
        code: `<span class="cm">// Basic function</span>
<span class="kw">func</span> <span class="fn">add</span>(a, b <span class="tp">int</span>) <span class="tp">int</span> {
    <span class="kw">return</span> a + b
}

<span class="cm">// Multiple return values</span>
<span class="kw">func</span> <span class="fn">divide</span>(a, b <span class="tp">float64</span>) (<span class="tp">float64</span>, <span class="tp">error</span>) {
    <span class="kw">if</span> b == <span class="num">0</span> {
        <span class="kw">return</span> <span class="num">0</span>, fmt.<span class="fn">Errorf</span>(<span class="str">"division by zero"</span>)
    }
    <span class="kw">return</span> a / b, <span class="kw">nil</span>
}

result, err := <span class="fn">divide</span>(<span class="num">10</span>, <span class="num">2</span>)
<span class="kw">if</span> err != <span class="kw">nil</span> {
    fmt.<span class="fn">Println</span>(<span class="str">"Error:"</span>, err)
}`,
        points: ["Multiple params of same type: a, b int", "Return multiple values with parentheses", "Caller must handle all return values", "Use _ to ignore a return value"]
      },
      {
        title: "Named Returns & Variadic",
        sub: "named returns · ... variadic",
        explain: "Named return values create variables in function scope. Variadic functions accept any number of arguments.",
        code: `<span class="cm">// Named returns</span>
<span class="kw">func</span> <span class="fn">minMax</span>(nums []<span class="tp">int</span>) (min, max <span class="tp">int</span>) {
    min, max = nums[<span class="num">0</span>], nums[<span class="num">0</span>]
    <span class="kw">for</span> _, n := <span class="kw">range</span> nums {
        <span class="kw">if</span> n &lt; min { min = n }
        <span class="kw">if</span> n &gt; max { max = n }
    }
    <span class="kw">return</span>  <span class="cm">// naked return</span>
}

<span class="cm">// Variadic function</span>
<span class="kw">func</span> <span class="fn">sum</span>(nums ...<span class="tp">int</span>) <span class="tp">int</span> {
    total := <span class="num">0</span>
    <span class="kw">for</span> _, n := <span class="kw">range</span> nums { total += n }
    <span class="kw">return</span> total
}
<span class="fn">sum</span>(<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>)       <span class="cm">// 6</span>
<span class="fn">sum</span>(nums...)        <span class="cm">// spread a slice</span>`,
        points: ["Named returns improve readability", "Naked return (bare return) returns named values", "Variadic: func f(args ...int)", "Spread slice: f(slice...)"]
      },
      {
        title: "First-Class Functions",
        sub: "func as value · function types · callbacks",
        explain: "Functions are values in Go — you can assign them to variables, pass them as arguments, and return them.",
        code: `<span class="cm">// Function as variable</span>
greet := <span class="kw">func</span>(name <span class="tp">string</span>) <span class="tp">string</span> {
    <span class="kw">return</span> <span class="str">"Hello, "</span> + name
}
fmt.<span class="fn">Println</span>(<span class="fn">greet</span>(<span class="str">"Go"</span>))

<span class="cm">// Higher-order function</span>
<span class="kw">func</span> <span class="fn">apply</span>(nums []<span class="tp">int</span>, f <span class="kw">func</span>(<span class="tp">int</span>) <span class="tp">int</span>) []<span class="tp">int</span> {
    result := <span class="fn">make</span>([]<span class="tp">int</span>, <span class="fn">len</span>(nums))
    <span class="kw">for</span> i, v := <span class="kw">range</span> nums {
        result[i] = <span class="fn">f</span>(v)
    }
    <span class="kw">return</span> result
}

doubled := <span class="fn">apply</span>([]<span class="tp">int</span>{<span class="num">1</span>,<span class="num">2</span>,<span class="num">3</span>}, <span class="kw">func</span>(x <span class="tp">int</span>) <span class="tp">int</span> { <span class="kw">return</span> x*<span class="num">2</span> })`,

let completedTopics = [];
let currentDay = 0;
let expandedTopic = null;

function saveProgress() {
  // progress stored in memory this session
}

function getTotalTopics() {
  return curriculum.reduce((sum, d) => sum + d.topics.length, 0);
}

function updateProgress() {
  const total = getTotalTopics();
  const done = completedTopics.length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('prog-text').textContent = `${done} / ${total} topics done`;
  document.getElementById('prog-bar').style.width = pct + '%';
}

function topicKey(dayIdx, topicIdx) {
  return `${dayIdx}-${topicIdx}`;
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = curriculum.map((d, i) => {
    const allDone = d.topics.every((_, ti) => completedTopics.includes(topicKey(i, ti)));
    return `<button class="day-btn ${i === currentDay ? 'active' : ''} ${allDone ? 'completed' : ''}" onclick="switchDay(${i})">
      <span class="check">${allDone ? '✓' : `${i+1}`}</span>
      Day ${i+1}: ${d.title}
    </button>`;
  }).join('');
}

function renderContent() {
  const day = curriculum[currentDay];
  const allDone = day.topics.every((_, ti) => completedTopics.includes(topicKey(currentDay, ti)));

  let html = `<div class="day-header">
    <div class="day-tag">Day ${currentDay + 1} of 7</div>
    <h2>${day.title}</h2>
    <p>${day.desc}</p>
  </div>`;

  if (allDone) {
    html += `<div class="day-complete-banner">
      <span class="emoji">🎉</span>
      <div><strong>Day ${currentDay+1} Complete!</strong> ${currentDay < 6 ? `Move on to Day ${currentDay+2}.` : "You've completed the full 7-day curriculum! 🚀"}</div>
    </div>`;
  }

  html += `<div class="topics-grid">`;
  day.topics.forEach((topic, ti) => {
    const key = topicKey(currentDay, ti);
    const isDone = completedTopics.includes(key);
    const isExpanded = expandedTopic === key;
    html += `
    <div class="topic-card ${isDone ? 'done' : ''} ${isExpanded ? 'expanded' : ''}" onclick="toggleTopic('${key}', event)">
      <div class="topic-title">
        ${isDone ? '✓ ' : ''}${topic.title}
        <span class="arrow">▶</span>
      </div>
      <div class="topic-subtitle">${topic.sub}</div>
      <div class="topic-body">
        <div class="explanation">${topic.explain}</div>
        <div class="code-block">${topic.code}</div>
        <div class="key-points">
          <h4>Key Points</h4>
          ${topic.points.map(p => `<div class="kp">${p}</div>`).join('')}
        </div>
        <button class="mark-done-btn" onclick="markDone('${key}', event)">${isDone ? '✓ Done' : 'Mark as Done'}</button>
      </div>
    </div>`;
  });
  html += `</div>`;

  document.getElementById('content').innerHTML = html;
}

function toggleTopic(key, e) {
  if (e.target.classList.contains('mark-done-btn')) return;
  expandedTopic = expandedTopic === key ? null : key;
  renderContent();
}

function markDone(key, e) {
  e.stopPropagation();
  if (!completedTopics.includes(key)) {
    completedTopics.push(key);
    saveProgress();
  }
  expandedTopic = null;
  updateProgress();
  renderSidebar();
  renderContent();
}

function switchDay(i) {
  currentDay = i;
  expandedTopic = null;
  renderSidebar();
  renderContent();
}

// Init
renderSidebar();
renderContent();
updateProgress();
</script>
